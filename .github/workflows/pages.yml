name: Deploy static Google Maps skin to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        env:
          GOOGLE_MAPS_API_KEY: ${{ vars.GOOGLE_MAPS_API_KEY }}
          GOOGLE_MAPS_MAP_ID: ${{ vars.GOOGLE_MAPS_MAP_ID }}
        run: |
          mkdir -p dist
          cp index.html styles.css preview.js open-world-game-map-style.js open-world-game-map-style.json dist/
          node -e "const fs = require('node:fs'); const key = process.env.GOOGLE_MAPS_API_KEY || ''; const mapId = process.env.GOOGLE_MAPS_MAP_ID || ''; fs.writeFileSync('dist/config.js', 'window.GOOGLE_MAPS_API_KEY = ' + JSON.stringify(key) + ';\\nwindow.GOOGLE_MAPS_MAP_ID = ' + JSON.stringify(mapId) + ';\\n');"
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
