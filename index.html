<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open World Google Maps Skin</title>
    <link rel="stylesheet" href="styles.css?v=4">
  </head>
  <body>
    <main class="shell">
      <section class="toolbar route-panel" aria-label="Map controls">
        <div>
          <h1>Open World Route Map</h1>
          <p id="route-status">Enter a destination. Start is your current location by default.</p>
        </div>
        <form id="route-form" class="route-form" hidden>
          <label for="origin">Start</label>
          <input id="origin" name="origin" autocomplete="street-address" placeholder="Current location">
          <label for="destination">Destination</label>
          <input id="destination" name="destination" autocomplete="street-address" placeholder="Address or coordinates">
          <div class="route-actions">
            <select id="travel-mode" name="travel-mode" aria-label="Travel mode">
              <option value="DRIVING">Driving</option>
              <option value="WALKING">Walking</option>
              <option value="BICYCLING">Bicycling</option>
              <option value="TRANSIT">Transit</option>
            </select>
            <button id="swap-route" type="button">Swap</button>
            <button type="submit">Route</button>
          </div>
          <div class="nav-actions">
            <button id="start-drive" type="button" disabled>Start Drive</button>
            <button id="demo-drive" type="button" disabled>Preview Drive</button>
          </div>
        </form>
        <section id="directions-panel" class="directions-panel" aria-label="Driving directions"></section>
        <form id="key-form" class="key-form" hidden>
          <label for="api-key">API key</label>
          <input id="api-key" name="api-key" type="password" autocomplete="off" placeholder="AIza...">
          <button type="submit">Load Map</button>
        </form>
      </section>
      <section id="map" class="map-surface" aria-label="Styled map preview">
        <div id="fallback" class="fallback-map">
          <span class="district district-a">Downtown</span>
          <span class="district district-b">Vinewood</span>
          <span class="district district-c">Harbor</span>
          <span class="district district-d">Canyon</span>
        </div>
      </section>
      <section id="navigation-hud" class="navigation-hud" aria-label="Navigation status" hidden>
        <div>
          <span id="nav-mode" class="nav-mode">Drive</span>
          <strong id="nav-instruction">Follow the route</strong>
          <span id="nav-detail">0.0 mi remaining</span>
        </div>
        <button id="stop-navigation" type="button">Exit</button>
      </section>
    </main>
    <script src="open-world-game-map-style.js?v=4"></script>
    <script src="config.js?v=4"></script>
    <script src="preview.js?v=7"></script>
  </body>
</html>
